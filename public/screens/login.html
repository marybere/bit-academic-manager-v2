<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BIT Academic Manager - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style>
  body {
    min-height: 100dvh;
    background-color: #0F1929;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  .login-card {
    display: flex;
    flex-direction: row;
    width: 860px;
    max-width: 95vw;
    max-height: 520px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
  }

  /* ── LEFT PANEL ── */
  .left-panel {
    flex: 1;
    width: 50%;
    min-width: 0;
    position: relative;
    overflow: hidden;
    background-image: url('./assets/campus.jpg');
    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 48px 40px;
    min-height: 520px;
  }

  .left-overlay {
    position: absolute;
    inset: 0;
    background: rgba(15, 25, 50, 0.55);
  }

  .left-content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    margin-top: 70px;
  }

  .left-content h2 {
    color: #ffffff;
    font-size: 32px;
    font-weight: 700;
    line-height: 1.3;
    text-align: center;
    letter-spacing: -0.02em;
    margin: 0 0 1.25rem 0;
  }

  .left-divider {
    width: 60px;
    height: 5px;
    background: rgba(255, 255, 255, 0.45);
    border: none;
    margin: 0 0 1.25rem 0;
    border-radius: 10px;
  }

  .left-content blockquote {
    color: rgba(255, 255, 255, 0.88);
    font-size: 16px;
    font-style: italic;
    font-weight: 400;
    line-height: 1.6;
    text-align: center;
    margin: 0;
  }

  /* ── RIGHT PANEL ── */
  .right-panel {
    flex: 1;
    width: 50%;
    min-width: 0;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 48px 44px;
    min-height: 520px;
  }

  .right-panel h1 {
    font-size: 1.75rem;
    font-weight: 700;
    color: #0f172a;
    margin: 0 0 0.375rem 0;
  }

  .right-panel .subtitle {
    font-size: 0.875rem;
    color: #64748b;
    margin: 0 0 2rem 0;
  }

  .field-label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: #374151;
    margin-bottom: 0.375rem;
  }

  .field-wrap {
    position: relative;
    margin-bottom: 1.25rem;
  }

  .field-wrap .material-icons {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #9ca3af;
    font-size: 18px;
    pointer-events: none;
  }

  .field-wrap input {
    width: 100%;
    padding: 0.75rem 0.875rem 0.75rem 2.5rem;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    background: #f8fafc;
    font-size: 0.875rem;
    color: #0f172a;
    outline: none;
    transition: border-color 0.15s;
    box-sizing: border-box;
  }

  .field-wrap input:focus {
    border-color: #C8184A;
    background: #fff;
  }

  .row-between {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    font-size: 0.8125rem;
  }

  .row-between label {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #64748b;
    cursor: pointer;
  }

  .row-between a {
    color: #C8184A;
    font-weight: 500;
    text-decoration: none;
  }

  .row-between a:hover { text-decoration: underline; }

  .btn-login {
    width: 100%;
    padding: 0.8125rem;
    background: #C8184A;
    color: #fff;
    font-size: 0.9375rem;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 1.5rem;
  }

  .btn-login:hover { background: #b01541; }

  .signup-row {
    text-align: center;
    font-size: 0.8125rem;
    color: #64748b;
  }

  .signup-row a {
    color: #C8184A;
    font-weight: 600;
    text-decoration: none;
  }

  .signup-row a:hover { text-decoration: underline; }

  /* Responsive: stack on small screens */
  @media (max-width: 640px) {
    .login-card { flex-direction: column; }
    .left-panel { min-height: 200px; justify-content: flex-end; }
    .right-panel { width: 100%; }
  }
</style>
</head>
<body>

<div class="login-card">

  <!-- ── LEFT PANEL ── -->
  <div class="left-panel">
    <!-- dark overlay -->
    <div class="left-overlay"></div>

    <!-- text content above overlay -->
    <div class="left-content">
      <h2>Burkina Institute<br>of Technology</h2>
      <hr class="left-divider"/>
      <blockquote>Educating a New Generation of Leaders</blockquote>
    </div>
  </div>

  <!-- ── RIGHT PANEL ── -->
  <div class="right-panel">
    <h1>Sign in</h1>
    <p class="subtitle">Access your academic portal</p>

    <form onsubmit="return false;">

      <!-- Email -->
      <label class="field-label" for="email">Email address</label>
      <div class="field-wrap">
        <span class="material-icons">mail_outline</span>
        <input id="email" name="email" type="email" placeholder="name@bit.edu" required/>
      </div>

      <!-- Password -->
      <label class="field-label" for="password">Password</label>
      <div class="field-wrap">
        <span class="material-icons">lock_outline</span>
        <input id="password" name="password" type="password" placeholder="••••••••" required/>
      </div>

      <!-- Remember + Forgot -->
      <div class="row-between">
        <label>
          <input type="checkbox" style="accent-color:#C8184A;"/>
          Remember me
        </label>
        <a href="#">Forgot password?</a>
      </div>

      <!-- Login button -->
      <button class="btn-login" type="button"
        onclick="window.top.location.href='/secretaire/dashboard'">
        Login Now
      </button>

    </form>

    <div class="signup-row">
      Don't have an account? <a href="#">Create a new one</a>
    </div>
  </div>

</div>

</body>
</html>
