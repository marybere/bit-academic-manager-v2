<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BIT Academic Manager - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#C8184A",
                        "background-light": "#f6f7f8",
                        "background-dark": "#13191f",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md">
<!-- Logo and Branding Section -->
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-20 h-20 rounded-lg bg-white dark:bg-slate-800 shadow-sm mb-4">
<img alt="BIT Logo" class="rounded-lg" data-alt="BIT University official logo placeholder" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBv_Q7RXMjRGP4tTK-Ags15pyLQZiUI0obfSu_mSXMH6_S9UuMQuTL3Y-Xrf33pIzTL_VTmyAvZRODVHU4bn-2DJ6sRP6QFUAHdCtfah-M2rRS4DjORT_oRnxgSMACmSa4c0HN4p4zMrrNDu1FzqtJ7rOmLBeVYV3esxKzdhRiWCCREbyiyHSHHL0h6cG_nowbQgujGewpBPt5YHo8B64xuTzKRSTTinCcMw3R7DaF8EYoJrfdQIUb-hboJB4sRAcKELem-wassMRLR"/>
</div>
<h1 class="text-3xl font-bold text-slate-900 dark:text-slate-100">BIT Academic Manager</h1>
<p class="text-slate-600 dark:text-slate-400 mt-2">University Management Portal</p>
</div>
<!-- Login Card -->
<div class="bg-white dark:bg-slate-800 rounded-lg shadow-xl border border-slate-200 dark:border-slate-700 p-8">
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1" for="email">Email address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-icons text-slate-400 text-lg">mail_outline</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary transition-colors text-sm" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-icons text-slate-400 text-lg">lock_open</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary transition-colors text-sm" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between text-sm">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-slate-300 rounded" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-slate-600 dark:text-slate-400" for="remember-me">Remember me</label>
</div>
<a class="font-medium text-primary hover:text-primary/80 transition-colors" href="#">Forgot password?</a>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all" type="submit">Sign In</button>
</form>
<!-- Secondary Actions -->
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-700 text-center">
<p class="text-sm text-slate-600 dark:text-slate-400">Need help? <a class="text-primary font-medium hover:underline" href="#">Contact support</a></p>
</div>
</div>
<!-- Footer Credits -->
<footer class="mt-8 text-center text-xs text-slate-500 dark:text-slate-500">
<p>© 2024 BIT Academic Manager. All rights reserved.</p>
<div class="mt-2 flex justify-center space-x-4">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Terms of Use</a>
</div>
</footer>
</div>
</body></html>
