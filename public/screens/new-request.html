<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>New Request Form (Redesign)</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#C8184A",
                        "background-light": "#f6f7f8",
                        "background-dark": "#13191f",
                    },
                    fontFamily: {
                        "display": ["Inter"],
                        "sans": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.5rem", 
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-icon {
            font-variation-settings: 'FILL' 1;
        }
        body {
            min-height: max(884px, 100dvh);
        }
        /* Override radio colors to match brand #C8184A */
        .peer:checked ~ div .radio-indicator {
            background-color: #C8184A;
            border-color: #C8184A;
        }
        .peer:checked ~ div {
            border-color: #C8184A !important;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-sans">
<header class="sticky top-0 z-50 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-4 py-4">
<div class="flex items-center justify-between max-w-md mx-auto">
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" onclick="window.top.location.href='/etudiant/dashboard'">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight">New Request</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
</header>
<main class="flex-1 max-w-md mx-auto w-full px-4 pb-24">
<div class="py-6">
<!-- Stepper -->
<div class="flex items-center justify-between mb-8 relative">
<div class="absolute top-1/2 left-0 w-full h-0.5 bg-slate-200 dark:bg-slate-800 -translate-y-1/2 z-0"></div>
<div class="relative z-10 flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center font-bold shadow-lg shadow-primary/20">1</div>
<span class="text-xs font-semibold text-primary">Type</span>
</div>
<div class="relative z-10 flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-white dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 text-slate-400 flex items-center justify-center font-bold">2</div>
<span class="text-xs font-medium text-slate-400">Details</span>
</div>
<div class="relative z-10 flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-white dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 text-slate-400 flex items-center justify-center font-bold">3</div>
<span class="text-xs font-medium text-slate-400">Confirmation</span>
</div>
</div>
<div class="mb-6">
<h2 class="text-2xl font-bold text-slate-900 dark:text-white">Which document do you need?</h2>
<p class="text-slate-500 dark:text-slate-400 mt-1">Select the type of official document you require.</p>
</div>
<div class="space-y-4">
<label class="relative block cursor-pointer group">
<input checked="" class="peer sr-only" name="doc_type" type="radio"/>
<div class="p-4 rounded-lg border-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm transition-all peer-checked:bg-primary/5">
<div class="flex items-start gap-4">
<div class="p-3 rounded-lg bg-primary/10 text-primary">
<span class="material-symbols-outlined active-icon">description</span>
</div>
<div class="flex-1">
<div class="flex items-center justify-between">
<h3 class="font-bold text-lg">Transcript</h3>
<div class="radio-indicator w-5 h-5 rounded-full border-2 border-slate-300 dark:border-slate-600 flex items-center justify-center transition-colors">
<div class="w-2 h-2 rounded-full bg-white opacity-0 peer-checked:opacity-100"></div>
</div>
</div>
<p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Official academic transcript detailing your results per semester.</p>
</div>
</div>
</div>
</label>
<label class="relative block cursor-pointer group">
<input class="peer sr-only" name="doc_type" type="radio"/>
<div class="p-4 rounded-lg border-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm transition-all peer-checked:bg-primary/5">
<div class="flex items-start gap-4">
<div class="p-3 rounded-lg bg-primary/10 text-primary">
<span class="material-symbols-outlined active-icon">verified</span>
</div>
<div class="flex-1">
<div class="flex items-center justify-between">
<h3 class="font-bold text-lg">Certificate of Enrollment</h3>
<div class="radio-indicator w-5 h-5 rounded-full border-2 border-slate-300 dark:border-slate-600 flex items-center justify-center transition-colors">
<div class="w-2 h-2 rounded-full bg-white opacity-0 peer-checked:opacity-100"></div>
</div>
</div>
<p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Official proof of enrollment for the current academic year.</p>
</div>
</div>
</div>
</label>
<label class="relative block cursor-pointer group">
<input class="peer sr-only" name="doc_type" type="radio"/>
<div class="p-4 rounded-lg border-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm transition-all peer-checked:bg-primary/5">
<div class="flex items-start gap-4">
<div class="p-3 rounded-lg bg-primary/10 text-primary">
<span class="material-symbols-outlined active-icon">school</span>
</div>
<div class="flex-1">
<div class="flex items-center justify-between">
<h3 class="font-bold text-lg">Diploma</h3>
<div class="radio-indicator w-5 h-5 rounded-full border-2 border-slate-300 dark:border-slate-600 flex items-center justify-center transition-colors">
<div class="w-2 h-2 rounded-full bg-white opacity-0 peer-checked:opacity-100"></div>
</div>
</div>
<p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Certified copy of your graduation diploma or certificate of achievement.</p>
</div>
</div>
</div>
</label>
</div>
</div>
<div class="mt-8">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 text-base focus:ring-2 focus:ring-primary focus:ring-offset-2 outline-none" onclick="window.top.location.href='/etudiant/track'">Continue <span class="material-symbols-outlined">arrow_forward</span></button>
<p class="text-center text-xs text-slate-400 mt-4">BIT Administration &amp; Services Académiques</p>
</div>
</main>
<nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-6 py-3 z-50">
<div class="max-w-md mx-auto flex items-center justify-between">
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined active-icon">add_circle</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Request</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">history</span>
<span class="text-[10px] font-medium uppercase tracking-wider">History</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Profile</span>
</a>
</div>
</nav>
</body></html>
